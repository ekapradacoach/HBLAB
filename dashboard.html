  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:         #1E2A3A;
      --navy-light:   #253347;
      --lime:         #C8E600;
      --violet:       #7B4FBE;
      --violet-light: #9B6FDE;
      --white:        #FFFFFF;
      --gray-text:    #94A3B8;
      --card-bg:      #243042;
      --card-border:  #2f3e52;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    /* ── Loading overlay ─────────────────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      transition: opacity 0.3s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(200,230,0,0.15);
      border-top-color: var(--lime);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Navbar ──────────────────────────────────── */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(30,42,58,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200,230,0,0.12);
      padding: 14px 0;
      transition: box-shadow 0.3s;
    }
    #navbar.scrolled { box-shadow: 0 4px 30px rgba(0,0,0,0.4); }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-svg  { width: 44px; height: 44px; flex-shrink: 0; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .logo-text .hb  { font-weight: 800; font-size: 1.25rem; color: var(--white); letter-spacing: 0.02em; }
    .logo-text .lab {
      font-family: 'Georgia', serif;
      font-style: italic;
      font-size: 0.78rem;
      color: var(--lime);
      letter-spacing: 0.12em;
    }

    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-email {
      font-size: 0.82rem;
      color: var(--gray-text);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-logout {
      background: transparent;
      border: 1.5px solid rgba(252,129,129,0.35);
      color: #FC8181;
      padding: 8px 18px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .btn-logout:hover { background: rgba(252,129,129,0.1); border-color: #FC8181; }

    /* ── Page body ───────────────────────────────── */
    #page { padding-top: 72px; }

    /* ── Greeting hero ───────────────────────────── */
    .dash-hero {
      background: var(--navy-light);
      border-bottom: 1px solid var(--card-border);
      padding: 44px 0;
      position: relative;
      overflow: hidden;
    }
    .dash-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,230,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,230,0,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .dash-hero-blob {
      position: absolute;
      width: 360px; height: 360px;
      background: rgba(123,79,190,0.12);
      border-radius: 50%;
      filter: blur(80px);
      top: -120px; right: -60px;
      pointer-events: none;
    }
    .hero-inner { position: relative; z-index: 1; }

    .greeting-tag {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--lime);
      margin-bottom: 10px;
    }
    .greeting-title {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .greeting-sub { color: var(--gray-text); font-size: 0.9rem; }

    /* ── Section ─────────────────────────────────── */
    .dash-section { padding: 44px 0 80px; }

    .section-header { margin-bottom: 28px; }
    .section-title  { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
    .section-sub    { font-size: 0.85rem; color: var(--gray-text); }

    /* ── Courses grid ────────────────────────────── */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* ── Course card (unlocked) ──────────────────── */
    .course-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .course-card::before {
      content: '';
      display: block;
      height: 3px;
      background: linear-gradient(90deg, var(--lime), var(--violet));
    }
    .course-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
      border-color: rgba(200,230,0,0.2);
    }

    .card-body { padding: 20px 20px 0; flex: 1; }
    .card-tag  {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--violet-light);
      margin-bottom: 8px;
    }
    .card-title { font-size: 0.95rem; font-weight: 700; line-height: 1.35; margin-bottom: 8px; }
    .card-desc  { font-size: 0.8rem; color: var(--gray-text); line-height: 1.6; }

    .card-divider { height: 1px; background: var(--card-border); margin: 16px 20px; }

    .card-footer { padding: 0 20px 20px; }

    .badge-access {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(200,230,0,0.1);
      border: 1px solid rgba(200,230,0,0.25);
      color: var(--lime);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
      margin-bottom: 12px;
    }

    .btn-ir {
      width: 100%;
      background: var(--lime);
      color: var(--navy);
      border: none;
      padding: 11px 16px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-ir:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 16px rgba(200,230,0,0.3);
    }

    /* Etapa X.10 — progreso + estado por card */
    .card-progress-block {
      margin-top: 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .card-status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em;
      padding: 3px 10px; border-radius: 100px; align-self: flex-start;
    }
    .card-status-badge.complete {
      background: rgba(200,230,0,0.12);
      border: 1px solid rgba(200,230,0,0.3);
      color: var(--lime);
    }
    .card-status-badge.test {
      background: rgba(123,79,190,0.15);
      border: 1px solid rgba(123,79,190,0.32);
      color: var(--violet-light);
    }
    .card-status-badge.nuevo {
      background: rgba(148,163,184,0.12);
      border: 1px solid rgba(148,163,184,0.3);
      color: var(--gray-text);
    }
    .card-status-badge.progreso {
      background: rgba(246,201,14,0.12);
      border: 1px solid rgba(246,201,14,0.3);
      color: #f6c90e;
    }
    .card-progress-bar {
      height: 4px; background: var(--card-border);
      border-radius: 100px; overflow: hidden; margin-top: 4px;
    }
    .card-progress-fill {
      height: 100%; background: var(--lime);
      border-radius: 100px; transition: width 0.5s ease;
    }
    .card-progress-label { font-size: 0.72rem; color: var(--gray-text); margin: 0; }

    /* ── Taller presencial ── */
    .card-status-badge.workshop {
      background: rgba(123,79,190,0.18);
      border: 1px solid rgba(123,79,190,0.4);
      color: var(--violet-light);
    }
    .workshop-meta { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
    .ws-meta-row { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; color: var(--gray-text); }
    .ws-meta-row span:first-child { font-size: 1rem; }

    /* Modal entrada */
    .entrada-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      display: none; align-items: center; justify-content: center; z-index: 9999;
      padding: 20px; backdrop-filter: blur(4px);
    }
    .entrada-overlay.open { display: flex; }
    .entrada-ticket {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 18px; max-width: 420px; width: 100%; position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6); overflow: hidden;
    }
    .entrada-head {
      background: linear-gradient(135deg, var(--violet,#7B4FBE) 0%, var(--violet-light,#9B6FDE) 100%);
      padding: 24px 28px; text-align: center;
    }
    .entrada-head .et-badge { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; opacity: 0.9; }
    .entrada-head h3 { font-size: 1.25rem; font-weight: 800; color: #fff; margin-top: 6px; }
    .entrada-body { padding: 24px 28px; }
    .entrada-field { margin-bottom: 16px; }
    .entrada-field .ef-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-text); display: block; margin-bottom: 3px; }
    .entrada-field .ef-val { font-size: 1rem; font-weight: 600; color: var(--white); }
    .entrada-instruccion {
      margin-top: 8px; padding: 14px; border-radius: 12px;
      background: rgba(200,230,0,0.1); border: 1px dashed rgba(200,230,0,0.4);
      text-align: center; font-size: 0.9rem; font-weight: 700; color: var(--lime);
    }
    .entrada-close {
      position: absolute; top: 12px; right: 12px; width: 30px; height: 30px; border-radius: 50%;
      background: rgba(0,0,0,0.25); border: none; color: #fff; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .entrada-actions { padding: 0 28px 24px; }
    .entrada-actions .btn-ir { width: 100%; justify-content: center; }

    /* ── Empty state ─────────────────────────────── */
    .empty-state {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 56px 32px;
      text-align: center;
      max-width: 520px;
    }
    .empty-icon {
      font-size: 2.8rem;
      margin-bottom: 20px;
      display: block;
    }
    .empty-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .empty-desc {
      font-size: 0.875rem;
      color: var(--gray-text);
      line-height: 1.65;
      margin-bottom: 28px;
    }
    .btn-catalogo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--lime);
      color: var(--navy);
      border: none;
      padding: 13px 28px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-catalogo:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(200,230,0,0.3);
    }

    /* ── Error state ─────────────────────────────── */
    .error-state {
      background: rgba(252,129,129,0.06);
      border: 1px solid rgba(252,129,129,0.2);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      max-width: 520px;
    }
    .error-state p { font-size: 0.875rem; color: #FC8181; line-height: 1.55; }

    /* ── Account card ────────────────────────────── */
    .account-section { margin-top: 52px; padding-top: 40px; border-top: 1px solid var(--card-border); }
    .account-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 24px;
      max-width: 440px;
    }
    .account-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--card-border);
    }
    .account-row:last-of-type { border-bottom: none; }
    .account-label { font-size: 0.78rem; color: var(--gray-text); font-weight: 500; }
    .account-value { font-size: 0.85rem; font-weight: 600; text-align: right; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }

    .btn-logout-card {
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1.5px solid rgba(252,129,129,0.35);
      color: #FC8181;
      padding: 10px 22px;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-logout-card:hover { background: rgba(252,129,129,0.08); border-color: #FC8181; }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 860px) {
      .courses-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .courses-grid { grid-template-columns: 1fr; }
      .nav-email { display: none; }
      .dash-section { padding-bottom: 52px; }
    }
  </style>
</head>

  <nav id="navbar">

  <script>
    // ── Etapa X.9: COURSE_META eliminado. TODOS los cursos usan curso.html?slug=X ──

    // ── Helpers ─────────────────────────────────────
    function hideLoading() {
      const el = document.getElementById('loading-screen');
      el.classList.add('fade-out');
      setTimeout(() => el.remove(), 350);
    }

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('es-AR', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    // ── Talleres presenciales ───────────────────────
    let _studentName = '';

    function escHtmlDash(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // live_date → "Sábado 4 de julio · 15:00 hs"
    function formatWorkshopDate(raw) {
      if (!raw) return '';
      const d = new Date(raw);
      if (isNaN(d.getTime())) return '';
      const fecha = d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
      const cap = fecha.charAt(0).toUpperCase() + fecha.slice(1);
      const hora = d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', hour12: false });
      return `${cap} · ${hora} hs`;
    }

    function showEntrada(w) {
      const fechaStr = w.live_date ? formatWorkshopDate(w.live_date) : 'Fecha a confirmar';
      const lugarStr = w.location || 'Lugar a confirmar';
      document.getElementById('entrada-alumno').textContent = _studentName || '—';
      document.getElementById('entrada-taller').textContent = w.title || '';
      document.getElementById('entrada-fecha').textContent  = fechaStr;
      document.getElementById('entrada-lugar').textContent  = lugarStr;
      document.getElementById('modal-entrada').classList.add('open');
    }

    function closeEntrada() {
      document.getElementById('modal-entrada').classList.remove('open');
    }

    // ── Renderizar cursos comprados ─────────────────
    // Etapa X.10: async + queries en paralelo para progreso (video_progress)
    // y test pendiente (course_quizzes + quiz_attempts).
    async function renderCourses(rows, user) {
      const container = document.getElementById('courses-container');
      const sub       = document.getElementById('courses-sub');

      if (!rows || rows.length === 0) {
        // Estado vacío
        sub.textContent = 'Todavía no tenés cursos adquiridos.';
        container.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon">🎓</span>
            <h3 class="empty-title">Todavía no tenés cursos</h3>
            <p class="empty-desc">
              ¡Explorá el catálogo y encontrá el curso que se adapta a tu perfil como entrenador!
            </p>
            <a href="index.html#cursos" class="btn-catalogo">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 3l14 9-14 9V3z"/></svg>
              Explorar catálogo
            </a>
          </div>`;
        return;
      }

      sub.textContent = `Tenés ${rows.length} curso${rows.length > 1 ? 's' : ''} activo${rows.length > 1 ? 's' : ''}.`;

      // Etapa X.10: 3 queries batch en paralelo (no N×3 secuenciales)
      const courseIds = rows.map(r => r.courses?.id).filter(Boolean);
      let completedByCourse = {};            // count crudo de video_progress por curso (no-modules)
      let progressByCourse  = {};            // Etapa X.59 — { courseId → {completed, total, isModulesMode} }
      let activeQuizCourses = new Set();
      let passedCourses     = new Set();

      if (courseIds.length && user) {
        try {
          // Etapa X.59 — el SELECT de video_progress ahora trae course_id Y video_index
          // (necesario para el cálculo por módulos: discriminar entre lecciones positivas
          // y lives negativos).
          const [progRes, quizRes, attRes] = await Promise.all([
            sb.from('video_progress')
              .select('course_id, video_index')
              .eq('user_id', user.id)
              .eq('completed', true)
              .in('course_id', courseIds),
            sb.from('course_quizzes')
              .select('course_id')
              .in('course_id', courseIds)
              .is('module_id', null)
              .eq('is_active', true),
            sb.from('quiz_attempts')
              .select('course_id')
              .eq('user_id', user.id)
              .eq('passed', true)
              .in('course_id', courseIds),
          ]);
          const completedIdxByCourse = {};   // { courseId → Set<video_index> }
          (progRes.data || []).forEach(r => {
            if (!completedIdxByCourse[r.course_id]) completedIdxByCourse[r.course_id] = new Set();
            completedIdxByCourse[r.course_id].add(r.video_index);
            // Contador legacy (no-modules) — cuenta solo índices >= 0
            if (typeof r.video_index === 'number' && r.video_index >= 0) {
              completedByCourse[r.course_id] = (completedByCourse[r.course_id] || 0) + 1;
            }
          });
          activeQuizCourses = new Set((quizRes.data || []).map(r => r.course_id));
          passedCourses     = new Set((attRes.data  || []).map(r => r.course_id));

          // Etapa X.59 — para cursos con course_type='modules', computamos el
          // progreso REAL por módulos (igual que curso.html). Total = módulos con
          // contenido (excluye módulos de certificación). Completados = módulos
          // con ≥1 entry completed=true (lección o live).
          const modulesCourseIds = rows
            .filter(r => r.courses?.course_type === 'modules')
            .map(r => r.courses.id);

          if (modulesCourseIds.length) {
            const { data: allModules } = await sb.from('course_modules')
              .select('id, course_id, order_num')
              .in('course_id', modulesCourseIds);
            const modIds = (allModules || []).map(m => m.id);

            let lessonsRes = { data: [] }, livesRes = { data: [] };
            if (modIds.length) {
              [lessonsRes, livesRes] = await Promise.all([
                sb.from('course_lessons').select('id, module_id').in('module_id', modIds),
                sb.from('course_lives').select('module_id').in('module_id', modIds),
              ]);
            }

            const lessonsByMod = {};
            (lessonsRes.data || []).forEach(l => {
              if (!lessonsByMod[l.module_id]) lessonsByMod[l.module_id] = [];
              lessonsByMod[l.module_id].push(l);
            });
            const livesByMod = {};
            (livesRes.data || []).forEach(lv => { livesByMod[lv.module_id] = true; });

            // Agrupar módulos por curso, attach lessons + live
            const modulesByCourse = {};
            (allModules || []).forEach(m => {
              if (!modulesByCourse[m.course_id]) modulesByCourse[m.course_id] = [];
              modulesByCourse[m.course_id].push({
                ...m,
                lessons: lessonsByMod[m.id] || [],
                hasLive: !!livesByMod[m.id],
              });
            });

            // Por curso: construir LESSON_IDX_BY_ID + contar módulos completos
            modulesCourseIds.forEach(cid => {
              const mods = (modulesByCourse[cid] || []).slice()
                .sort((a, b) => (Number(a.order_num) || 0) - (Number(b.order_num) || 0));
              const cSet = completedIdxByCourse[cid] || new Set();

              // Flat-index por lesson UUID (idéntico al patrón de curso.html)
              const lessonIdxById = {};
              let i = 0;
              mods.forEach(m => { m.lessons.forEach(l => { lessonIdxById[l.id] = i++; }); });

              // Excluir módulos de certificación (sin lecciones ni live)
              const contentMods = mods.filter(m => m.lessons.length || m.hasLive);
              let done = 0;
              contentMods.forEach(m => {
                const o = Number(m.order_num);
                const liveIdx  = -1 * ((Number.isFinite(o) && o > 0) ? o : 1);
                const liveDone = m.hasLive && cSet.has(liveIdx);
                const lessonDone = m.lessons.some(l => cSet.has(lessonIdxById[l.id]));
                if (liveDone || lessonDone) done++;
              });
              progressByCourse[cid] = {
                completed:     done,
                total:         contentMods.length,
                isModulesMode: true,
              };
            });
          }
        } catch (e) {
          console.warn('dashboard: queries de progreso/quiz fallaron, render sin badges enriquecidos:', e);
        }
      }

      const cards = rows.map(row => {
        const course = row.courses;

        // ── Taller presencial: card diferenciada (sin progreso ni certificado) ──
        if (course.is_workshop) {
          const fechaStr = course.live_date ? formatWorkshopDate(course.live_date) : 'Fecha a confirmar';
          const lugarStr = course.location || 'Lugar a confirmar';
          const safeCourse = JSON.stringify({
            title: course.title, live_date: course.live_date || '', location: course.location || '',
          }).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
          return `
            <div class="course-card workshop-card">
              <div class="card-body">
                <span class="card-status-badge workshop">🏋️ Taller presencial</span>
                <h3 class="card-title" style="margin-top:12px">${escHtmlDash(course.title)}</h3>
                <div class="workshop-meta">
                  <div class="ws-meta-row"><span>📅</span><span>${escHtmlDash(fechaStr)}</span></div>
                  <div class="ws-meta-row"><span>📍</span><span>${escHtmlDash(lugarStr)}</span></div>
                </div>
              </div>
              <div class="card-divider"></div>
              <div class="card-footer">
                <div class="badge-access">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                  Lugar reservado
                </div>
                <button class="btn-ir" data-w='${safeCourse}' onclick='showEntrada(JSON.parse(this.dataset.w))'>
                  🎟️ Ver entrada
                </button>
              </div>
            </div>`;
        }

        const meta   = { tag: 'Curso · Online', page: `curso.html?slug=${course.slug}` };

        // Etapa X.59 — cursos modules-mode usan progressByCourse (por módulos);
        // resto usa completedByCourse + total_videos (por lecciones/videos).
        const modProg  = progressByCourse[course.id];
        const isModulesMode = !!modProg;
        const completed = isModulesMode ? modProg.completed : (completedByCourse[course.id] || 0);
        const total     = isModulesMode ? modProg.total     : (course.total_videos || 0);
        // Cap a 100 por si video_progress quedó con índices viejos tras un reordenamiento
        const pct = total > 0 ? Math.min(100, Math.round(completed / total * 100)) : 0;
        const hasPendingQuiz = activeQuizCourses.has(course.id) && !passedCourses.has(course.id);

        // Decidir status badge — orden literal del spec del usuario
        let statusCls, statusText;
        if (total > 0 && pct >= 100) {
          statusCls = 'complete'; statusText = '✅ Completado';
        } else if (hasPendingQuiz) {
          statusCls = 'test';     statusText = '📝 Test disponible';
        } else if (completed === 0) {
          statusCls = 'nuevo';    statusText = '🆕 Sin comenzar';
        } else {
          statusCls = 'progreso'; statusText = '▶ En progreso';
        }

        // Barra de progreso solo si total > 0
        const unitSingular = isModulesMode ? 'módulo'  : 'clase';
        const unitPlural   = isModulesMode ? 'módulos' : 'clases';
        const progressHtml = total > 0
          ? `<div class="card-progress-bar"><div class="card-progress-fill" style="width:${pct}%"></div></div>
             <p class="card-progress-label">${completed} de ${total} ${total !== 1 ? unitPlural : unitSingular} completado${completed !== 1 ? 's' : ''}</p>`
          : '';

        return `
          <div class="course-card">
            <div class="card-body">
              <div class="card-tag">${meta.tag}</div>
              <h3 class="card-title">${course.title}</h3>
              <p class="card-desc">${course.description || ''}</p>
              <div class="card-progress-block">
                <span class="card-status-badge ${statusCls}">${statusText}</span>
                ${progressHtml}
              </div>
            </div>
            <div class="card-divider"></div>
            <div class="card-footer">
              <div class="badge-access">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                Acceso activo
              </div>
              <button class="btn-ir" onclick="window.location.href='${meta.page}'">
                Ir al curso →
              </button>
            </div>
          </div>`;
      }).join('');

      container.innerHTML = `<div class="courses-grid">${cards}</div>`;
    }

    // ── Renderizar error de consulta ────────────────
    function renderQueryError() {
      document.getElementById('courses-sub').textContent = 'No se pudo cargar la información.';
      document.getElementById('courses-container').innerHTML = `
        <div class="error-state">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FC8181" stroke-width="2" stroke-linecap="round" flex-shrink="0" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <p>Ocurrió un error al cargar tus cursos. Intentá recargar la página.</p>
        </div>`;
    }

    // ── Init principal ──────────────────────────────
    async function init() {
      // 1. Esperar sesión activa
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.replace('login.html');
        return;
      }

      const user = session.user;

      // 2. Consultar rol del usuario en public.profiles
      //    DEBE hacerse ANTES de renderizar nada para poder redirigir sin flash.
      const { data: profile } = await sb
        .from('profiles')
        .select('role, full_name')
        .eq('id', user.id)
        .single();

      const role = profile?.role || 'student';

      if (role === 'admin') {
        window.location.replace('admin.html');
        return;
      }
      if (role === 'coach') {
        window.location.replace('coach.html');
        return;
      }

      // 3. Es alumno → poblar UI
      const name = profile?.full_name
                || user.user_metadata?.full_name
                || user.user_metadata?.name
                || user.email.split('@')[0];

      _studentName = name;
      document.getElementById('greeting-name').textContent = name;
      document.getElementById('nav-email').textContent     = user.email;
      document.getElementById('account-email').textContent = user.email;
      document.getElementById('last-login').textContent    = formatDate(user.last_sign_in_at);

      // Notificaciones in-app — bell + dropdown + realtime (Sesión 58)
      if (typeof initNotifs === 'function') initNotifs(user);

      // 4. Consultar cursos comprados
      //    JOIN: user_courses → courses
      //    Filtro: user_id = usuario logueado, payment_status = 'paid', status = 'active'
      const { data, error } = await sb
        .from('user_courses')
        .select(`
          id,
          enrolled_at,
          courses (
            id,
            slug,
            title,
            description,
            price_ars,
            price_usd,
            total_videos,
            course_type,
            is_workshop,
            live_date,
            location,
            max_seats
          )
        `)
        .eq('user_id', user.id)
        .eq('payment_status', 'paid')
        .eq('status', 'active');

      if (error) {
        console.error('Error consultando user_courses:', error.message);
        renderQueryError();
      } else {
        // Etapa X.10: pasar el user logueado para poder consultar progress + quiz_attempts en paralelo
        await renderCourses(data, user);
      }

      // 5. Ocultar loading
      hideLoading();
    }

    // ── Logout ──────────────────────────────────────
    async function logout() {
      await sb.auth.signOut();
      window.location.replace('index.html');
    }

    // ── Detectar logout desde otra pestaña ──────────
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT' || !session) {
        window.location.replace('login.html');
      }
    });

    // ── Navbar scroll shadow ────────────────────────
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
    });

    // ── Arrancar ────────────────────────────────────
    init();
  </script>

  <!-- ─── Soporte FAB (Etapa X.36) ────────────────────── -->

      position: fixed; bottom: 24px; right: 24px; z-index: 999;

      .support-fab { width: 48px; height: 48px; bottom: 16px; right: 16px; font-size: 22px; }
    }
  </style>
  <a class="support-fab"
     href="mailto:ekapradacoach@gmail.com?subject=Consulta%20HB%20Lab&body=Hola%2C%20tengo%20una%20consulta%20sobre..."
     aria-label="Soporte por email">✉</a>

  <!-- ─── Modal: Entrada al taller presencial ─── -->
  <div class="entrada-overlay" id="modal-entrada" onclick="if(event.target===this) closeEntrada()">
    <div class="entrada-ticket">
      <button class="entrada-close" onclick="closeEntrada()" aria-label="Cerrar">×</button>
      <div class="entrada-head">
        <span class="et-badge">🎟️ Entrada · Taller presencial</span>
        <h3 id="entrada-taller"></h3>
      </div>
      <div class="entrada-body">
        <div class="entrada-field">
          <span class="ef-label">Alumno</span>
          <span class="ef-val" id="entrada-alumno"></span>
        </div>
        <div class="entrada-field">
          <span class="ef-label">Fecha y hora</span>
          <span class="ef-val" id="entrada-fecha"></span>
        </div>
        <div class="entrada-field">
          <span class="ef-label">Dirección</span>
          <span class="ef-val" id="entrada-lugar"></span>
        </div>
        <div class="entrada-instruccion">Presentá esta pantalla en la puerta</div>
      </div>
      <div class="entrada-actions">
        <button class="btn-ir" onclick="closeEntrada()">Cerrar</button>
      </div>
    </div>
  </div>
